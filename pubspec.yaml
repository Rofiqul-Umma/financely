name: financely
description: "Financely - Your Personal Financial tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (BLoC / Cubit)
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^8.0.3

  # Local database (Drift + SQLite)
  drift: ^2.28.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # UI / MD3
  fl_chart: ^1.0.0
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1

  # Persistence for settings
  shared_preferences: ^2.3.5

  # Networking
  http: ^1.2.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  csv: ^6.0.0
  share_plus: ^11.0.0
  file_selector: ^1.0.3

  # Security (passcode + biometric)
  local_auth: ^2.3.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.28.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins.ttf
    - family: RobotoSlab
      fonts:
        - asset: assets/fonts/RobotoSlab.ttf
    - family: ElmsSans
      fonts:
        - asset: assets/fonts/ElmsSans.ttf
    - family: GeistPixel
      fonts:
        - asset: assets/fonts/GeistPixel.ttf
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans.ttf
    - family: GoogleSansCode
      fonts:
        - asset: assets/fonts/GoogleSansCode.ttf
    - family: ShadowsIntoLight
      fonts:
        - asset: assets/fonts/ShadowsIntoLight.ttf

# App launcher icons for Android, iOS, web & macOS. Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#333333"
  min_sdk_android: 21
  adaptive_icon_background: "#333333"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#333333"
    theme_color: "#333333"
